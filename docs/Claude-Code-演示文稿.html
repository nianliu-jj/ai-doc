<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 学习笔记</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root {
            --space-unit: 8px;
            --space-xs: calc(var(--space-unit) * 1);
            --space-sm: calc(var(--space-unit) * 1.5);
            --space-md: calc(var(--space-unit) * 2);
            --space-lg: calc(var(--space-unit) * 3);
            --space-xl: calc(var(--space-unit) * 4);

            --accent: oklch(65% 0.16 285);
            --accent-rgb: 160, 115, 215;
            --accent-soft: color-mix(in oklch, var(--accent), transparent 85%);

            --spring-green: #2f845e;
            --spring-green-light: #e8f4ee;

            --happy-blue: #c0e6ff;
            --happy-red: #fe5f58;
            --happy-purple: #a68bff;
            --happy-yellow: #fbe598;

            --bg-primary: linear-gradient(135deg, #c0e6ff 0%, #e8f4ee 50%, #f3f0ff 100%);
            --bg-slide: rgba(255, 255, 255, 0.95);
            --bg-card: rgba(255, 255, 255, 0.85);

            --text-primary: #282c34;
            --text-secondary: #5a6270;
            --text-muted: #8b929c;

            --border-color: rgba(0, 0, 0, 0.08);
            --border-accent: rgba(160, 115, 215, 0.3);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.12);

            --code-bg: #292d3e;
            --code-text: #a6accd;
            --code-dot-red: #fc625d;
            --code-dot-yellow: #fdbc40;
            --code-dot-green: #34c759;

            --font-sans: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            --font-mono: "Fira Code", "SF Mono", Monaco, Consolas, monospace;

            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-primary);
            background-attachment: fixed;
        }

        #app { width: 100%; height: 100%; position: relative; }

        .slide-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .slide-card {
            width: 100%;
            max-width: 1180px;
            height: calc(100vh - 40px);
            max-height: 720px;
            background: var(--bg-slide);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }

        .window-controls {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .window-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform var(--transition-fast);
        }

        .window-dot:hover { transform: scale(1.15); }
        .dot-red { background: var(--code-dot-red); }
        .dot-yellow { background: var(--code-dot-yellow); }
        .dot-green { background: var(--code-dot-green); }

        .slide-header {
            padding: 38px 40px 14px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .slide-number {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--accent-soft);
            padding: 3px 10px;
            border-radius: 14px;
        }

        .slide-title {
            font-size: 1.55rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slide-title .icon { font-size: 1.4rem; }

        .slide-subtitle {
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .slide-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 40px;
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 3px;
        }

        .slide-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px 40px 28px;
            scroll-behavior: smooth;
        }

        .slide-content::-webkit-scrollbar { width: 4px; }
        .slide-content::-webkit-scrollbar-track { background: transparent; }
        .slide-content::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, rgba(160, 115, 215, 0.3), rgba(47, 132, 94, 0.3));
            border-radius: 2px;
        }

        .content-section { margin-bottom: 16px; }

        .content-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid var(--accent);
        }

        .content-section h4 {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 12px 0 5px;
        }

        .content-section p {
            font-size: 0.88rem;
            line-height: 1.65;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .content-list {
            list-style: none;
            padding: 0;
            margin: 6px 0;
        }

        .content-list li {
            position: relative;
            padding-left: 16px;
            margin-bottom: 4px;
            font-size: 0.88rem;
            line-height: 1.55;
            color: var(--text-secondary);
        }

        .content-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 7px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--spring-green));
        }

        .code-block {
            background: var(--code-bg);
            border-radius: 8px;
            padding: 14px;
            margin: 8px 0;
            position: relative;
            overflow: hidden;
        }

        .code-block::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--code-dot-red);
            box-shadow: 14px 0 0 var(--code-dot-yellow), 28px 0 0 var(--code-dot-green);
        }

        .code-block pre {
            margin-top: 14px;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.45;
            color: var(--code-text);
            overflow-x: auto;
        }

        .code-block code {
            font-family: var(--font-mono);
            background: transparent;
            padding: 0;
            color: inherit;
        }

        code {
            font-family: var(--font-mono);
            font-size: 0.82em;
            padding: 1px 5px;
            border-radius: 4px;
            background: rgba(160, 115, 215, 0.12);
            color: var(--accent);
            font-weight: 500;
        }

        .callout {
            padding: 10px 12px;
            border-radius: 8px;
            margin: 8px 0;
            border-left: 3px solid;
        }

        .callout-info { background: rgba(62, 161, 220, 0.08); border-color: #3ea1dc; }
        .callout-tip { background: rgba(47, 132, 94, 0.08); border-color: var(--spring-green); }
        .callout-warning { background: rgba(240, 173, 78, 0.08); border-color: #f0ad4e; }
        .callout-danger { background: rgba(219, 82, 79, 0.08); border-color: #db524f; }

        .callout-title {
            font-weight: 600;
            font-size: 0.78rem;
            margin-bottom: 3px;
        }

        .callout-info .callout-title { color: #3ea1dc; }
        .callout-tip .callout-title { color: var(--spring-green); }
        .callout-warning .callout-title { color: #f0ad4e; }
        .callout-danger .callout-title { color: #db524f; }

        .callout p { margin: 0; font-size: 0.84rem; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 8px 0;
        }

        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            transition: all var(--transition-normal);
        }

        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-accent);
        }

        .info-card h4 {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .info-card p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.45;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 8px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            font-size: 0.84rem;
        }

        .data-table th, .data-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            background: linear-gradient(135deg, rgba(160, 115, 215, 0.08), rgba(47, 132, 94, 0.08));
            font-weight: 600;
            color: var(--text-primary);
        }

        .data-table td { color: var(--text-secondary); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:nth-child(even) td { background: rgba(160, 115, 215, 0.03); }

        .tag {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 500;
            margin: 1px;
        }

        .tag-purple { background: rgba(166, 139, 255, 0.15); color: var(--happy-purple); }
        .tag-green { background: rgba(47, 132, 94, 0.15); color: var(--spring-green); }
        .tag-blue { background: rgba(96, 171, 255, 0.15); color: #60abff; }
        .tag-red { background: rgba(254, 95, 88, 0.15); color: var(--happy-red); }
        .tag-yellow { background: rgba(251, 229, 152, 0.3); color: #b8860b; }

        .nav-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            background: var(--bg-slide);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            color: var(--text-secondary);
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--spring-green));
            transition: width var(--transition-normal);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--text-muted);
            font-size: 0.65rem;
            opacity: 0;
            transition: opacity var(--transition-normal);
            pointer-events: none;
        }

        .scroll-indicator.show { opacity: 1; animation: bounce 2s infinite; }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-3px); }
        }

        .title-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        .title-slide .main-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), var(--spring-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-slide .main-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .title-slide .meta-info {
            display: flex;
            gap: 18px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* === 图表样式 === */
        .diagram-container {
            background: linear-gradient(135deg, rgba(160, 115, 215, 0.04), rgba(47, 132, 94, 0.04));
            border-radius: 10px;
            padding: 14px;
            margin: 10px 0;
        }

        .flow-diagram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 8px 0;
        }

        .flow-box {
            background: var(--bg-card);
            border: 2px solid var(--border-accent);
            border-radius: 8px;
            padding: 8px 12px;
            text-align: center;
            min-width: 80px;
        }

        .flow-box.highlight {
            background: linear-gradient(135deg, rgba(160, 115, 215, 0.15), rgba(47, 132, 94, 0.15));
            border-color: var(--accent);
        }

        .flow-box .title {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            margin-bottom: 1px;
        }

        .flow-box .desc {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .flow-arrow {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .loop-container {
            border: 2px dashed var(--accent);
            border-radius: 12px;
            padding: 12px;
            position: relative;
        }

        .loop-label {
            position: absolute;
            top: -9px;
            left: 16px;
            background: var(--bg-slide);
            padding: 0 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
        }

        .layer-diagram {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .layer-row {
            display: flex;
            align-items: stretch;
            gap: 6px;
        }

        .layer-block {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .layer-block.primary {
            background: linear-gradient(135deg, rgba(160, 115, 215, 0.1), rgba(47, 132, 94, 0.1));
            border-color: var(--border-accent);
        }

        .layer-block .name {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .layer-block .items {
            font-size: 0.74rem;
            color: var(--text-secondary);
        }

        .context-pie {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .pie-chart {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(
                var(--happy-purple) 0deg 36deg,
                var(--spring-green) 36deg 180deg,
                var(--happy-blue) 180deg 288deg,
                var(--happy-yellow) 288deg 360deg
            );
            position: relative;
            flex-shrink: 0;
        }

        .pie-chart::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: var(--bg-slide);
            border-radius: 50%;
        }

        .pie-legend {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .step-flow {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 10px;
            background: var(--bg-card);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }

        .step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-content .title {
            font-weight: 600;
            font-size: 0.84rem;
            color: var(--text-primary);
        }

        .step-content .desc {
            font-size: 0.74rem;
            color: var(--text-muted);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 6px;
        }

        .tool-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }

        .tool-item .icon {
            font-size: 1.1rem;
            margin-bottom: 3px;
        }

        .tool-item .name {
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--text-primary);
        }

        .tool-item .desc {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .highlight-box {
            background: linear-gradient(135deg, rgba(160, 115, 215, 0.08), rgba(47, 132, 94, 0.08));
            border: 1px solid var(--border-accent);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
        }

        .highlight-box .title {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .highlight-box p {
            font-size: 0.84rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .slide-card { border-radius: 12px; height: calc(100vh - 20px); }
            .slide-header { padding: 32px 18px 12px; }
            .slide-content { padding: 14px 18px 22px; }
            .slide-title { font-size: 1.3rem; }
            .two-columns { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: 1fr; }
            .context-pie { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="slide-container">
            <div class="slide-card">
                <div class="window-controls">
                    <div class="window-dot dot-red"></div>
                    <div class="window-dot dot-yellow"></div>
                    <div class="window-dot dot-green"></div>
                </div>

                <div v-if="currentSlide === 0" class="title-slide slide-content">
                    <div class="main-title">Claude Code 学习笔记</div>
                    <div class="main-subtitle">从入门到精通的实战指南</div>
                    <div class="meta-info">
                        <span>基于轩辕Code教程</span>
                        <span>v6.0.0</span>
                        <span>约 25 分钟</span>
                    </div>
                </div>

                <template v-else>
                    <div class="slide-header">
                        <div class="slide-number">{{ currentSlide }} / {{ totalSlides - 1 }}</div>
                        <h2 class="slide-title">
                            <span class="icon">{{ slides[currentSlide]?.icon }}</span>
                            {{ slides[currentSlide]?.title }}
                        </h2>
                        <p class="slide-subtitle">{{ slides[currentSlide]?.subtitle }}</p>
                    </div>
                    <div class="slide-content" ref="slideContent" @scroll="checkScroll">
                        <div v-html="slides[currentSlide]?.content"></div>
                    </div>
                </template>

                <div class="nav-controls">
                    <button class="nav-btn" @click="prevSlide" :disabled="currentSlide === 0">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <button class="nav-btn" @click="nextSlide" :disabled="currentSlide === totalSlides - 1">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>

                <div class="progress-bar" :style="{ width: progressWidth }"></div>

                <div class="scroll-indicator" :class="{ show: showScrollIndicator }">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12l7 7 7-7"/>
                    </svg>
                    <span>向下滚动</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                const currentSlide = ref(0);
                const slideContent = ref(null);
                const showScrollIndicator = ref(false);

                const slides = ref([
                    {},
                    {
                        title: '什么是 Claude Code',
                        subtitle: '命令行 AI 编程搭档',
                        icon: '🤖',
                        content: `
                            <div class="content-section">
                                <h3>定义</h3>
                                <div class="highlight-box">
                                    <div class="title">Claude Code = Anthropic 推出的命令行 AI 编程搭档</div>
                                    <p>它直接运行在终端里，能理解你的整个项目代码，帮你编写、修改、调试代码，甚至执行命令和 Git 操作。</p>
                                </div>

                                <h3>核心能力矩阵</h3>
                                <div class="cards-grid">
                                    <div class="info-card">
                                        <h4>🧠 代码理解</h4>
                                        <p>理解整个项目代码库，支持跨文件分析</p>
                                    </div>
                                    <div class="info-card">
                                        <h4>✏️ 代码编写</h4>

                                        <p>使用 <code>--continue</code> 保持连续性；大文件只读取关键部分；定期 /compact。</p>
                                    </div>
                                    <div class="callout callout-tip">
                                        <div class="callout-title">💡 并行提效</div>
                                        <p>让 Claude 同时启动多个子代理：审查、测试、文档可并行进行。</p>
                                    </div>
                                </div>

                                <div class="highlight-box" style="margin-top: 10px;">
                                    <div class="title">🎯 核心原则</div>
                                    <p>给 Claude 清晰的上下文和明确的指令，它会成为你最高效的编程搭档。<br><strong>明确 > 简洁，具体 > 抽象</strong></p>
                                </div>
                            </div>
                        `
                    }
                ]);

                const totalSlides = computed(() => slides.value.length);
                const progressWidth = computed(() => `${((currentSlide.value + 1) / totalSlides.value) * 100}%`);

                const nextSlide = () => {
                    if (currentSlide.value < totalSlides.value - 1) {
                        currentSlide.value++;
                        showScrollIndicator.value = false;
                    }
                };

                const prevSlide = () => {
                    if (currentSlide.value > 0) {
                        currentSlide.value--;
                        showScrollIndicator.value = false;
                    }
                };

                const checkScroll = () => {
                    if (slideContent.value) {
                        const { scrollTop, scrollHeight, clientHeight } = slideContent.value;
                        showScrollIndicator.value = scrollTop < scrollHeight - clientHeight - 30;
                    }
                };

                const handleKeydown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') {
                        e.preventDefault();
                        nextSlide();
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        prevSlide();
                    }
                };

                onMounted(() => window.addEventListener('keydown', handleKeydown));
                onUnmounted(() => window.removeEventListener('keydown', handleKeydown));

                return {
                    currentSlide, totalSlides, slides, slideContent,
                    showScrollIndicator, progressWidth, nextSlide, prevSlide, checkScroll
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
